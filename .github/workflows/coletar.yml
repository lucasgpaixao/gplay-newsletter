name: Coletar noticias

# Coleta horaria de noticias (RSS) e videos (YouTube). Durante evento em foco ao vivo,
# coletar-acelerada.yml roda a cada 20 min. Mesma fila de commit (concurrency: coletar).
# O cron do GitHub pode atrasar em horarios de pico; execucoes travadas sao canceladas
# pela proxima agendada (cancel-in-progress) e o job tem timeout de 20 min.

on:
  schedule:
    - cron: "0 * * * *" # a cada 1 hora (UTC)
  workflow_dispatch: {} # permite rodar manualmente pela aba Actions

permissions:
  contents: write

concurrency:
  group: coletar
  cancel-in-progress: true

jobs:
  coletar:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          for i in 1 2 3; do
            npm ci && break
            echo "npm ci falhou (tentativa $i), repetindo em 15s..."
            sleep 15
          done

      - name: Coletar
        run: npm run coletar

      - name: Commitar mudancas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/noticias src/content/videos
          if git diff --staged --quiet; then
            echo "Sem novidades nesta rodada."
          else
            git commit -m "chore: atualiza noticias ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
